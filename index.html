<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Display</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            align-items: center; 
            justify-content: center;
        }

        /* Заряд батареи - аккуратно сверху */
        #battery { 
            position: absolute; 
            top: 30px; 
            right: 30px; 
            font-size: 1.2rem; 
            font-weight: 300; 
            color: #444; 
        }

        /* Часы - огромные и стильные */
        #time { 
            font-size: 15rem; 
            font-weight: 700; 
            letter-spacing: -5px;
            line-height: 1;
        }

        /* Погода - чистый текст, крупнее */
        #weather-frame { 
            border: none; 
            width: 500px; 
            height: 80px; 
            margin-top: 20px; 
            background: transparent;
        }

        /* Принудительный стиль текста внутри виджета */
        iframe {
            color: white !important;
            font-size: 2rem !important;
        }
    </style>
</head>
<body>

    <div id="battery">--%</div>
    <div id="time">00:00</div>

    <iframe id="weather-frame" src="https://wttr.in/Omsk?format=3&transparency=1"></iframe>

    <script>
        // Часы
        function updateTime() {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('ru', {hour: '2-digit', minute: '2-digit'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const update = () => document.getElementById('battery').innerText = Math.round(b.level * 100) + "%";
                update();
                b.onlevelchange = update;
            });
        }

        // Обновление погоды (раз в 20 минут, чтобы не дергать сеть часто)
        setInterval(() => {
            const frame = document.getElementById('weather-frame');
            frame.src = "https://wttr.in/Omsk?format=3&transparency=1&t=" + Date.now();
        }, 1200000);
    </script>
</body>
</html>
