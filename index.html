<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Домашний Смарт-Дисплей</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            padding: 4vw; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            user-select: none;
            cursor: pointer;
        }

        /* Верхняя панель: Батарея */
        .top-row {
            display: flex;
            justify-content: flex-start;
            width: 100%;
            max-width: 800px;
        }

        .battery-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 600;
        }

        .battery-icon {
            width: clamp(40px, 5vw, 55px);
            height: clamp(20px, 2.5vw, 27px);
            border: 3px solid #fff;
            border-radius: 6px;
            position: relative;
            padding: 2px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 9px;
            background: #fff;
            border-radius: 0 3px 3px 0;
        }

        .battery-level {
            height: 100%;
            background: #4caf50;
            width: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        @keyframes charging {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        .charging { animation: charging 1.5s infinite; }

        /* Центр: Время и Дата */
        .main-clock {
            text-align: center;
            width: 100%;
            margin: auto 0;
        }

        #time {
            font-size: clamp(4.5rem, 14vw, 12rem); 
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        #date {
            font-size: clamp(1.4rem, 3.5vw, 2.8rem);
            color: #94a3b8;
            margin-top: 2vh;
            font-weight: 400;
            text-transform: capitalize;
        }

        /* Низ: Погода (Новый стабильный метод) */
        .weather-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .weather-box {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Стилизация картинки-информера, чтобы она идеально вписалась */
        .weather-box img {
            max-width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.05));
        }

        /* Подсказка полноэкранного режима */
        .fullscreen-hint {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            transition: opacity 1s;
        }
    </style>
</head>
<body onclick="toggleFullscreen()">

    <div class="fullscreen-hint" id="hint">Тапни по экрану, чтобы убрать рамки браузера</div>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="top-row">
        <div class="battery-container" id="battery-box">
            <div class="battery-icon">
                <div class="battery-level" id="battery-level"></div>
            </div>
            <span id="battery-text">--%</span>
        </div>
    </div>

    <!-- ЦЕНТР: ЧАСЫ -->
    <div class="main-clock">
        <div id="time">00:00:00</div>
        <div id="date">Понедельник, 1 января</div>
    </div>

    <!-- НИЗ: ПОГОДА -->
    <div class="weather-row">
        <div class="weather-box">
            <!-- Сверхнадежный информер погоды для Омска, оформленный под темную тему -->
            <img id="weather-img" src="https://meteo.paraplan.net/informer/html5/omsk_full_dark.png" alt="Погода в Омске">
        </div>
    </div>

    <script>
        // --- ФУНКЦИЯ ДЛЯ ПОЛНОЭКРАННОГО РЕЖИМА ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    document.getElementById('hint').style.opacity = '0';
                }).catch(err => {
                    console.log(`Ошибка фуллскрина: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
                document.getElementById('hint').style.opacity = '1';
            }
        }

        // --- АВТООБНОВЛЕНИЕ КАРТИНКИ ПОГОДЫ ---
        function refreshWeatherImage() {
            const img = document.getElementById('weather-img');
            // Добавляем к ссылке случайный хвостик времени, чтобы браузер не брал старую картинку из кэша
            img.src = "https://meteo.paraplan.net/informer/html5/omsk_full_dark.png?nocache=" + new Date().getTime();
        }
        // Обновляем картинку погоды раз в 15 минут
        setInterval(refreshWeatherImage, 15 * 60 * 1000);


        // --- ОБНОВЛЕНИЕ ВРЕМЕНИ И ДАТЫ ---
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', options);
        }
        setInterval(updateClock, 1000);
        updateClock();


        // --- КОНТРОЛЬ БАТАРЕИ ---
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBatteryStatus() {
                    let level = Math.round(battery.level * 100);
                    document.getElementById('battery-text').textContent = level + '%';
                    const levelDiv = document.getElementById('battery-level');
                    levelDiv.style.width = level + '%';

                    if (level <= 15) levelDiv.style.backgroundColor = '#ef4444';
                    else if (level <= 40) levelDiv.style.backgroundColor = '#f59e0b';
                    else levelDiv.style.backgroundColor = '#4caf50';

                    const batteryBox = document.getElementById('battery-box');
                    if (battery.charging) batteryBox.classList.add('charging');
                    else batteryBox.classList.remove('charging');
                }
                updateBatteryStatus();
                battery.addEventListener('levelchange', updateBatteryStatus);
                battery.addEventListener('chargingchange', updateBatteryStatus);
            });
        } else {
            document.getElementById('battery-box').style.display = 'none';
        }
    </script>
</body>
</html>
