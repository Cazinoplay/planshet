<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт-Дисплей</title>
    <style>
        body { 
            background: #000; color: #fff; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; 
            height: 100vh; align-items: center; justify-content: center; 
        }
        #battery { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; color: #555; }
        #time { font-size: 8rem; font-weight: bold; }
        
        #weather-frame { 
            border: none; width: 400px; height: 100px; margin-top: 20px; 
            background: transparent;
        }
        
        #version { position: absolute; bottom: 10px; font-size: 0.8rem; color: #333; }
    </style>
</head>
<body>

    <div id="battery">Заряд: --%</div>
    <div id="time">00:00:00</div>

    <iframe id="weather-frame" src="https://wttr.in/Omsk?format=3&transparency=1"></iframe>

    <div id="version">v.1.5</div>

    <script>
        // Часы
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('ru');
        }, 1000);

        // Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const update = () => document.getElementById('battery').innerText = "Заряд: " + Math.round(b.level * 100) + "%";
                update();
                b.onlevelchange = update;
            });
        }

        // Обновление iframe каждые 10 минут
        setInterval(() => {
            const frame = document.getElementById('weather-frame');
            frame.src = "https://wttr.in/Omsk?format=3&transparency=1&t=" + Date.now();
        }, 600000);
    </script>
</body>
</html>
