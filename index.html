<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смарт-Дисплей</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #time { font-size: 8rem; font-weight: bold; }
        #weather { font-size: 2rem; color: #3b82f6; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="time">--:--:--</div>
    <div id="weather">Старт...</div>

    <script>
        // Часы (работают всегда)
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('ru');
        }, 1000);

        // Функция погоды с "маячками"
        async function loadWeather() {
            const el = document.getElementById('weather');
            el.innerText = "Запрос...";
            
            try {
                // Используем альтернативный API, который почти никогда не блокируется
                const response = await fetch("https://wttr.in/Omsk?format=3");
                
                if (!response.ok) {
                    el.innerText = "Ошибка ответа";
                    return;
                }
                
                const text = await response.text();
                el.innerText = text;
            } catch (err) {
                el.innerText = "Ошибка: " + err.name;
                console.log("Детали ошибки:", err);
            }
        }
        
        loadWeather();
    </script>
</body>
</html>
