<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Смарт-Дисплей</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            padding: 4vw; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            user-select: none;
            cursor: pointer;
        }

        .top-row { display: flex; justify-content: flex-start; width: 100%; max-width: 800px; }
        .battery-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 600;
        }

        .main-clock { text-align: center; width: 100%; margin: auto 0; }
        #time { font-size: clamp(4.5rem, 14vw, 12rem); font-weight: 700; line-height: 0.9; text-shadow: 0 0 40px rgba(255,255,255,0.15); }
        #date { font-size: clamp(1.4rem, 3.5vw, 2.8rem); color: #94a3b8; margin-top: 2vh; }

        .weather-row { display: flex; justify-content: center; width: 100%; }
        .weather-box {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 3vw 5vw;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .weather-info { display: flex; flex-direction: column; gap: 5px; }
        .weather-city { font-size: clamp(1.1rem, 2.5vw, 1.6rem); font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .weather-desc { font-size: clamp(1rem, 2vw, 1.4rem); color: #3b82f6; }
        .weather-temp { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; color: #ffffff; }
    </style>
</head>
<body onclick="if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();">

    <div class="top-row">
        <div class="battery-container" id="battery-box">
            <span id="battery-text">--%</span>
        </div>
    </div>

    <div class="main-clock">
        <div id="time">00:00:00</div>
        <div id="date">--</div>
    </div>

    <div class="weather-row">
        <div class="weather-box">
            <div class="weather-info">
                <div class="weather-city">ОМСК</div>
                <div class="weather-desc" id="weather-status">Загрузка...</div>
            </div>
            <div class="weather-temp" id="weather-temp">--°C</div>
        </div>
    </div>

    <script>
        const LATITUDE = 54.9924;  
        const LONGITUDE = 73.3686; 

        async function getWeather() {
            try {
                const targetUrl = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current_weather=true`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents);
                
                if (data && data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    document.getElementById('weather-temp').textContent = (temp > 0 ? '+' : '') + temp + '°C';
                    document.getElementById('weather-status').textContent = getWeatherDescription(code);
                }
            } catch (error) {
                document.getElementById('weather-status').textContent = "Ошибка сети";
            }
        }

        function getWeatherDescription(code) {
            const codes = {0: "Ясно", 1: "Ясно", 2: "Облачно", 3: "Пасмурно", 45: "Туман", 61: "Дождь", 71: "Снег", 95: "Гроза"};
            return codes[code] || "Переменная облачность";
        }

        getWeather();
        setInterval(getWeather, 600000);

        function updateClock() {
            const n = new Date();
            document.getElementById('time').textContent = n.toLocaleTimeString('ru-RU');
            document.getElementById('date').textContent = n.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                function update() { document.getElementById('battery-text').textContent = Math.round(b.level * 100) + '%'; }
                update();
                b.addEventListener('levelchange', update);
            });
        }
    </script>
</body>
</html>
