<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт-Дисплей</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: space-around; }
        #time { font-size: 15vh; font-weight: bold; }
        #weather { font-size: 5vh; color: #3b82f6; text-align: center; }
        #battery { font-size: 3vh; color: #666; }
    </style>
</head>
<body>
    <div id="battery">Заряд: --%</div>
    <div id="time">00:00</div>
    <div id="weather">Загрузка данных...</div>

    <script>
        // 1. Часы
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('ru', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        // 2. Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const update = () => document.getElementById('battery').innerText = "Заряд: " + Math.round(b.level * 100) + "%";
                update();
                b.onlevelchange = update;
            });
        }

        // 3. Погода через более простой подход
        async function loadWeather() {
            const el = document.getElementById('weather');
            try {
                // Используем другой API (через сервис, который часто работает лучше на планшетах)
                const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=54.9893&longitude=73.3682&current=temperature_2m");
                if (!res.ok) throw new Error("API статус " + res.status);
                const data = await res.json();
                el.innerText = "Омск: " + Math.round(data.current.temperature_2m) + "°C";
            } catch (err) {
                // Если ошибка, выводим что именно не так
                el.innerText = "Ошибка: " + err.message;
            }
        }
        loadWeather();
        setInterval(loadWeather, 300000);
    </script>
</body>
</html>
