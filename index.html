<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смарт-Дисплей</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 40px;
            justify-content: space-between;
            user-select: none;
        }

        /* Верхняя панель */
        .top-row { display: flex; justify-content: flex-start; }
        .battery-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Часы и дата */
        .main-clock { text-align: center; margin: auto 0; }
        #time { font-size: 10rem; font-weight: 700; }
        #date { font-size: 2.5rem; color: #94a3b8; }

        /* Нижний блок (Омск) */
        .info-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .city-title { font-size: 1.5rem; color: #3b82f6; text-transform: uppercase; letter-spacing: 2px; }
        .status-text { font-size: 1.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="top-row">
        <div class="battery-box" id="battery-text">Заряд: --%</div>
    </div>

    <div class="main-clock">
        <div id="time">00:00:00</div>
        <div id="date">--</div>
    </div>

    <div class="info-panel">
        <div class="city-title">ОМСК</div>
        <div class="status-text">Сибирский уют</div>
    </div>

    <script>
        // Обновление времени и даты
        function updateClock() {
            var n = new Date();
            document.getElementById('time').textContent = n.toLocaleTimeString('ru-RU');
            document.getElementById('date').textContent = n.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Обновление батареи
        if (navigator.getBattery) {
            navigator.getBattery().then(function(b) {
                function update() { document.getElementById('battery-text').textContent = 'Заряд: ' + Math.round(b.level * 100) + '%'; }
                update();
                b.addEventListener('levelchange', update);
            });
        }
    </script>
</body>
</html>
