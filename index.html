
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; }

  .display {
    min-height: 520px;
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .ambient {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .top-bar {
    position: absolute;
    top: 20px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 24px;
  }

  .battery-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .battery-icon {
    width: 28px; height: 14px;
    border: 1.5px solid rgba(255,255,255,0.25);
    border-radius: 3px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 2px;
  }

  .battery-icon::after {
    content: '';
    position: absolute;
    right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 3px; height: 6px;
    background: rgba(255,255,255,0.25);
    border-radius: 0 2px 2px 0;
  }

  .battery-fill {
    height: 100%;
    border-radius: 1px;
    background: #4ade80;
    transition: width 0.5s ease;
  }

  .battery-pct {
    font-size: 12px;
    color: rgba(255,255,255,0.45);
    font-weight: 400;
    letter-spacing: 0.02em;
  }

  .version {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em;
  }

  .time-block {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .time-display {
    font-size: clamp(72px, 14vw, 96px);
    font-weight: 200;
    color: #ffffff;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .time-seconds {
    font-size: clamp(28px, 5vw, 36px);
    font-weight: 200;
    color: rgba(255,255,255,0.35);
    letter-spacing: -0.02em;
    vertical-align: super;
    margin-left: 4px;
  }

  .date-line {
    margin-top: 10px;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 300;
  }

  .divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.08);
    margin: 24px auto;
  }

  .weather-block {
    display: flex;
    align-items: center;
    gap: 20px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 16px 28px;
    position: relative;
    z-index: 1;
    min-width: 260px;
    justify-content: center;
  }

  .weather-city {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .weather-temp {
    font-size: 32px;
    font-weight: 200;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .weather-desc {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  .weather-icon {
    font-size: 36px;
    line-height: 1;
  }

  .weather-loading {
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.05em;
    padding: 4px 0;
  }

  .weather-right {
    border-left: 0.5px solid rgba(255,255,255,0.08);
    padding-left: 20px;
    margin-left: 4px;
  }

  .battery-bar-wrap {
    position: absolute;
    bottom: 20px; left: 24px; right: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .battery-bar-bg {
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
  }

  .battery-bar-fg {
    height: 100%;
    border-radius: 2px;
    background: #4ade80;
    transition: width 0.8s ease;
  }

  .battery-bar-label {
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    white-space: nowrap;
  }
</style>

<div class="display" id="display">
  <div class="ambient"></div>

  <div class="top-bar">
    <div class="battery-wrap">
      <div class="battery-icon">
        <div class="battery-fill" id="bfill" style="width:70%"></div>
      </div>
      <span class="battery-pct" id="bpct">—%</span>
    </div>
    <span class="version">v 2.0</span>
  </div>

  <div class="time-block">
    <div class="time-display">
      <span id="hm">00:00</span><span class="time-seconds" id="ss">:00</span>
    </div>
    <div class="date-line" id="datestr">пн, 1 янв</div>
  </div>

  <div class="divider"></div>

  <div class="weather-block">
    <div class="weather-icon" id="wicon">🌤️</div>
    <div>
      <div class="weather-city">Омск</div>
      <div class="weather-temp" id="wtemp">—°</div>
      <div class="weather-desc" id="wdesc">загрузка...</div>
    </div>
    <div class="weather-right">
      <div class="weather-desc" style="margin-bottom:6px" id="wwind">—</div>
      <div class="weather-desc" id="whum">—</div>
    </div>
  </div>

  <div class="battery-bar-wrap">
    <div class="battery-bar-bg"><div class="battery-bar-fg" id="bbar" style="width:70%"></div></div>
    <span class="battery-bar-label" id="bstatus">заряд батареи</span>
  </div>
</div>

<script>
const DAYS = ['вс','пн','вт','ср','чт','пт','сб'];
const MONTHS = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];

function updateTime() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('hm').textContent = h + ':' + m;
  document.getElementById('ss').textContent = ':' + s;
  document.getElementById('datestr').textContent =
    DAYS[now.getDay()] + ', ' + now.getDate() + ' ' + MONTHS[now.getMonth()];
}
setInterval(updateTime, 1000);
updateTime();

function setBattery(level, charging) {
  const pct = Math.round(level * 100);
  const col = pct > 20 ? '#4ade80' : '#f87171';
  document.getElementById('bpct').textContent = pct + '%';
  document.getElementById('bfill').style.width = pct + '%';
  document.getElementById('bfill').style.background = col;
  document.getElementById('bbar').style.width = pct + '%';
  document.getElementById('bbar').style.background = col;
  document.getElementById('bstatus').textContent = charging ? '⚡ зарядка' : 'заряд батареи';
}

if (navigator.getBattery) {
  navigator.getBattery().then(b => {
    setBattery(b.level, b.charging);
    b.onlevelchange = () => setBattery(b.level, b.charging);
    b.onchargingchange = () => setBattery(b.level, b.charging);
  });
}

const iconMap = {
  'sunny': '☀️', 'clear': '🌙', 'cloudy': '☁️', 'overcast': '☁️',
  'rain': '🌧️', 'drizzle': '🌦️', 'snow': '❄️', 'thunder': '⛈️',
  'mist': '🌫️', 'fog': '🌫️', 'partly': '⛅', 'light rain': '🌦️',
};

function getIcon(desc) {
  const d = (desc || '').toLowerCase();
  for (const [k, v] of Object.entries(iconMap)) {
    if (d.includes(k)) return v;
  }
  return '🌤️';
}

async function fetchWeather() {
  try {
    const r = await fetch('https://wttr.in/Omsk?format=j1');
    const d = await r.json();
    const c = d.current_condition[0];
    const temp = c.temp_C;
    const desc = c.weatherDesc[0].value;
    const wind = c.windspeedKmph + ' км/ч';
    const hum = 'влажн. ' + c.humidity + '%';
    document.getElementById('wtemp').textContent = temp + '°';
    document.getElementById('wdesc').textContent = desc;
    document.getElementById('wicon').textContent = getIcon(desc);
    document.getElementById('wwind').textContent = '💨 ' + wind;
    document.getElementById('whum').textContent = '💧 ' + hum;
  } catch {
    document.getElementById('wdesc').textContent = 'нет данных';
  }
}
fetchWeather();
setInterval(fetchWeather, 600000);
</script>
