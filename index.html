<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт-Дисплей</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #time { font-size: 8rem; font-weight: bold; }
        #weather { font-size: 2rem; color: #3b82f6; margin-top: 20px; }
        #battery { font-size: 1.5rem; color: #555; position: absolute; top: 20px; }
    </style>
</head>
<body>
    <div id="battery">Заряд: --%</div>
    <div id="time">00:00:00</div>
    <div id="weather">Инициализация...</div>

    <script>
        // Часы
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('ru');
        }, 1000);

        // Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const update = () => document.getElementById('battery').innerText = "Заряд: " + Math.round(b.level * 100) + "%";
                update();
                b.onlevelchange = update;
            });
        }

        // Фикс для GitHub Pages
        async function loadWeather() {
            const el = document.getElementById('weather');
            try {
                // Используем fetch с параметром mode: 'cors' - это "ключ" для разрешения доступа к сторонним API
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=54.9893&longitude=73.3682&current=temperature_2m", {
                    method: 'GET',
                    mode: 'cors',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error("Ошибка " + response.status);
                
                const data = await response.json();
                const temp = Math.round(data.current.temperature_2m);
                el.innerText = "Омск: " + (temp > 0 ? "+" : "") + temp + "°C";
            } catch (err) {
                el.innerText = "Ошибка: " + err.message;
            }
        }
        
        loadWeather();
        setInterval(loadWeather, 600000);
    </script>
</body>
</html>
