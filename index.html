<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смарт-Дисплей</title>
    <style>
        body { font-family: sans-serif; background-color: #0b0f19; color: #ffffff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; }
        .battery { font-size: 1.2rem; align-self: flex-start; }
        .clock-section { text-align: center; }
        #time { font-size: 8rem; font-weight: bold; line-height: 1; }
        #date { font-size: 2rem; color: #94a3b8; }
        .weather-box { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; }
        #weather-temp { font-size: 3rem; font-weight: bold; }
        #weather-status { color: #3b82f6; }
    </style>
</head>
<body onclick="document.documentElement.requestFullscreen()">

    <div class="battery" id="battery-level">Заряд: --%</div>

    <div class="clock-section">
        <div id="time">00:00</div>
        <div id="date">--</div>
    </div>

    <div class="weather-box">
        <div id="weather-temp">...</div>
        <div id="weather-status">Ожидание сети...</div>
    </div>

    <script>
        // Время
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.getHours() + ":" + String(now.getMinutes()).padStart(2, '0');
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(batt => {
                function update() { document.getElementById('battery-level').textContent = "Заряд: " + Math.round(batt.level * 100) + "%"; }
                update();
                batt.addEventListener('levelchange', update);
            });
        }

        // Погода (максимально простой запрос)
        async function fetchWeather() {
            try {
                const response = await fetch("https://api.open-meteo.com/v1/forecast?latitude=54.9893&longitude=73.3682&current_weather=true");
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                document.getElementById('weather-temp').textContent = (temp > 0 ? "+" : "") + temp + "°C";
                document.getElementById('weather-status').textContent = "Омск";
            } catch (err) {
                document.getElementById('weather-status').textContent = "Нет сети (ошибка API)";
            }
        }
        fetchWeather();
    </script>
</body>
</html>
