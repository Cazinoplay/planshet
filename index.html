<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Смарт-Дисплей</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #time { font-size: 8rem; font-weight: bold; }
        #weather { font-size: 2rem; color: #3b82f6; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="time">--:--:--</div>
    <div id="weather">Загрузка...</div>

    <script>
        // Часы
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('ru');
        }, 1000);

        // --- ХИТРЫЙ МЕТОД: Внедрение скрипта ---
        // Это не запрос Fetch, это просто загрузка "картинки" со скриптом
        // Браузеры не блокируют это политиками безопасности
        function loadWeather() {
            const script = document.createElement('script');
            // Мы используем публичный API, который отдает данные через функцию callback
            script.src = "https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/Omsk?unitGroup=metric&key=YOUR_API_KEY&contentType=json";
            
            // Если ты не хочешь регистрироваться, используем самый простой вариант:
            script.src = "https://wttr.in/Omsk?format=j1&callback=showWeather";
            
            document.body.appendChild(script);
        }

        // Эта функция вызовется сама, когда придут данные
        window.showWeather = function(data) {
            const temp = data.current_condition[0].temp_C;
            document.getElementById('weather').innerText = "Омск: " + temp + "°C";
        };

        loadWeather();
    </script>
</body>
</html>
