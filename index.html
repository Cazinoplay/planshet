<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт-Дисплей</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        #time { font-size: 12vw; font-weight: bold; }
        #weather { font-size: 4vw; color: #3b82f6; margin-top: 20px; }
        #battery { font-size: 2vw; color: #555; position: absolute; top: 20px; left: 20px; }
    </style>
</head>
<body>
    <div id="battery">Заряд: --%</div>
    <div id="time">00:00:00</div>
    <div id="weather">Подключение...</div>

    <script>
        // Часы
        setInterval(() => {
            document.getElementById('time').innerText = new Date().toLocaleTimeString('ru');
        }, 1000);

        // Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(b => {
                const update = () => document.getElementById('battery').innerText = "Заряд: " + Math.round(b.level * 100) + "%";
                update();
                b.onlevelchange = update;
            });
        }

        // РЕЗЕРВНЫЙ МЕТОД ПОГОДЫ
        function loadWeather() {
            const el = document.getElementById('weather');
            // Простейший способ проверки интернета: пробуем загрузить скрипт
            const script = document.createElement('script');
            script.src = "https://api.open-meteo.com/v1/forecast?latitude=54.9893&longitude=73.3682&current=temperature_2m&callback=weatherCallback";
            script.onerror = () => el.innerText = "Сеть заблокирована (настройки безопасности)";
            document.body.appendChild(script);
        }

        function weatherCallback(data) {
            const temp = Math.round(data.current.temperature_2m);
            document.getElementById('weather').innerText = "Омск: " + (temp > 0 ? "+" : "") + temp + "°C";
        }

        loadWeather();
        setInterval(loadWeather, 300000);
    </script>
</body>
</html>
