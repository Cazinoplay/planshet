<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Домашний Смарт-Дисплей</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            padding: 2vh 4vw;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            gap: 1.5vh;
            overflow-y: auto;
            overflow-x: hidden;
            user-select: none;
            cursor: pointer;
        }

        /* Верхняя панель: Батарея */
        .top-row {
            display: flex;
            justify-content: flex-start;
            width: 100%;
            max-width: 800px;
            flex-shrink: 0;
        }

        .battery-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 600;
        }

        .battery-icon {
            width: clamp(40px, 5vw, 55px);
            height: clamp(20px, 2.5vw, 27px);
            border: 3px solid #fff;
            border-radius: 6px;
            position: relative;
            padding: 2px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 9px;
            background: #fff;
            border-radius: 0 3px 3px 0;
        }

        .battery-level {
            height: 100%;
            background: #4caf50;
            width: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        @keyframes charging {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        .charging { animation: charging 1.5s infinite; }

        /* Центр: Время и Дата */
        .main-clock {
            text-align: center;
            width: 100%;
            margin: auto 0;
            min-height: 0;
        }

        #time {
            font-size: clamp(2.5rem, min(13vw, 18vh), 12rem);
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        #date {
            font-size: clamp(1.1rem, min(3.2vw, 5vh), 2.8rem);
            color: #94a3b8;
            margin-top: 1.5vh;
            font-weight: 400;
            text-transform: capitalize;
        }

        /* Низ: Автономная Погода */
        .weather-row {
            display: flex;
            justify-content: center;
            width: 100%;
            flex-shrink: 0;
        }

        .weather-box {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: clamp(10px, 2.5vh, 30px) clamp(20px, 5vw, 50px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .weather-city {
            font-size: clamp(1rem, min(2.5vw, 3.5vh), 1.6rem);
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .weather-desc {
            font-size: clamp(0.85rem, min(1.8vw, 2.8vh), 1.3rem);
            color: #3b82f6;
        }

        .weather-temp {
            font-size: clamp(2rem, min(5.5vw, 7vh), 4rem);
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
        }

        /* Подсказка полноэкранного режима */
        .fullscreen-hint {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            transition: opacity 1s;
        }
    </style>
</head>
<body onclick="toggleFullscreen()">

    <div class="fullscreen-hint" id="hint">Тапни по экрану, чтобы убрать рамки браузера</div>
    <a href="https://jsonplaceholder.typicode.com/todos/1">Текст ссылки</a>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="top-row">
        <div class="battery-container" id="battery-box">
            <div class="battery-icon">
                <div class="battery-level" id="battery-level"></div>
            </div>
            <span id="battery-text">--%</span>
        </div>
    </div>

    <!-- ЦЕНТР: ЧАСЫ -->
    <div class="main-clock">
        <div id="time">00:00:00</div>
        <div id="date">Понедельник, 1 января</div>
    </div>

    <!-- НИЗ: ПОГОДА -->
    <div class="weather-row">
        <div class="weather-box">
            <div class="weather-info">
                <div class="weather-city">ОМСК СЕЙЧАС</div>
                <div class="weather-desc" id="weather-status">Отличный день!</div>
            </div>
            <div class="weather-temp" id="weather-temp">Омск</div>
        </div>
    </div>

    <script>
        // --- ФУНКЦИЯ ДЛЯ ПОЛНОЭКРАННОГО РЕЖИМА ---
        function toggleFullscreen() {
            try {
                if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement) {
                    var docElm = document.documentElement;
                    if (docElm.requestFullscreen) { docElm.requestFullscreen(); }
                    else if (docElm.mozRequestFullScreen) { docElm.mozRequestFullScreen(); }
                    else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }
                    document.getElementById('hint').style.opacity = '0';
                } else {
                    if (document.exitFullscreen) { document.exitFullscreen(); }
                    else if (document.mozCancelFullScreen) { document.mozCancelFullScreen(); }
                    else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
                    document.getElementById('hint').style.opacity = '1';
                }
            } catch(e) {
                document.getElementById('hint').style.display = 'none';
            }
        }

        // --- РЕЗЕРВНАЯ ПОГОДА ПО МЕСЯЦАМ (ИСПОЛЬЗУЕТСЯ ТОЛЬКО ЕСЛИ НЕТ ИНТЕРНЕТА) ---
        function updateOfflineWeather() {
            var now = new Date();
            var month = now.getMonth(); // 0 - Январь, 11 - Декабрь

            var tempText = "";
            var descText = "";

            // Статистические данные погоды в Омске по месяцам + советы
            if (month === 0) { tempText = "-16°C"; descText = "Нет связи • Обычно в январе так"; }
            else if (month === 1) { tempText = "-14°C"; descText = "Нет связи • Обычно в феврале так"; }
            else if (month === 2) { tempText = "-6°C"; descText = "Нет связи • Обычно в марте так"; }
            else if (month === 3) { tempText = "+5°C"; descText = "Нет связи • Обычно в апреле так"; }
            else if (month === 4) { tempText = "+15°C"; descText = "Нет связи • Обычно в мае так"; }
            else if (month === 5) { tempText = "+20°C"; descText = "Нет связи • Обычно в июне так"; }
            else if (month === 6) { tempText = "+22°C"; descText = "Нет связи • Обычно в июле так"; }
            else if (month === 7) { tempText = "+19°C"; descText = "Нет связи • Обычно в августе так"; }
            else if (month === 8) { tempText = "+12°C"; descText = "Нет связи • Обычно в сентябре так"; }
            else if (month === 9) { tempText = "+3°C"; descText = "Нет связи • Обычно в октябре так"; }
            else if (month === 10) { tempText = "-6°C"; descText = "Нет связи • Обычно в ноябре так"; }
            else if (month === 11) { tempText = "-13°C"; descText = "Нет связи • Обычно в декабре так"; }

            document.getElementById('weather-temp').textContent = tempText;
            document.getElementById('weather-status').textContent = descText;
        }

        // --- ПЕРЕВОД КОДА ПОГОДЫ (WMO) В ПОНЯТНЫЙ ТЕКСТ ---
        function getWeatherDescription(code, isDay) {
            if (code === 0) return isDay ? "Ясно" : "Ясная ночь";
            if (code === 1 || code === 2) return "Малооблачно";
            if (code === 3) return "Облачно";
            if (code === 45 || code === 48) return "Туман";
            if (code === 51 || code === 53 || code === 55) return "Морось";
            if (code === 56 || code === 57) return "Ледяная морось";
            if (code === 61 || code === 63 || code === 65) return "Дождь";
            if (code === 66 || code === 67) return "Ледяной дождь";
            if (code === 71 || code === 73 || code === 75 || code === 77) return "Снег";
            if (code === 80 || code === 81 || code === 82) return "Ливень";
            if (code === 85 || code === 86) return "Снегопад";
            if (code === 95) return "Гроза";
            if (code === 96 || code === 99) return "Гроза с градом";
            return "Переменная погода";
        }

        // --- НАСТОЯЩАЯ ПОГОДА ИЗ ИНТЕРНЕТА (Open-Meteo, координаты Омска) ---
        function updateOnlineWeather() {
            try {
                if (typeof fetch !== 'function') {
                    console.warn("В этом браузере нет fetch(), показываю резервные данные");
                    updateOfflineWeather();
                    return;
                }

                var lat = 54.9893;
                var lon = 73.3682;
                var url = "https://api.open-meteo.com/v1/forecast?latitude=" + lat +
                    "&longitude=" + lon +
                    "&current_weather=true&windspeed_unit=ms&timezone=auto";

                var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
                var timeoutId = controller ? setTimeout(function() { controller.abort(); }, 8000) : null;
                var fetchOptions = controller ? { signal: controller.signal } : undefined;

                fetch(url, fetchOptions)
                    .then(function(response) {
                        if (timeoutId) clearTimeout(timeoutId);
                        if (!response.ok) throw new Error("Плохой ответ сервера погоды");
                        return response.json();
                    })
                    .then(function(data) {
                        var cw = data.current_weather;
                        var temp = Math.round(cw.temperature);
                        var tempText = (temp > 0 ? "+" : "") + temp + "°C";
                        var desc = getWeatherDescription(cw.weathercode, cw.is_day === 1);
                        var wind = Math.round(cw.windspeed);
                        var descText = desc + " • ветер " + wind + " м/с";

                        document.getElementById('weather-temp').textContent = tempText;
                        document.getElementById('weather-status').textContent = descText;
                    })
                    .catch(function(err) {
                        if (timeoutId) clearTimeout(timeoutId);
                        console.warn("Не удалось загрузить погоду из интернета, показываю резервные данные:", err);
                        updateOfflineWeather();
                    });
            } catch (e) {
                console.warn("Ошибка при попытке получить погоду:", e);
                updateOfflineWeather();
            }
        }

        // Сразу показываем хотя бы примерную погоду по месяцу, чтобы экран
        // никогда не оставался с надписью "Омск" из заготовки в HTML
        updateOfflineWeather();
        // Затем пробуем подгрузить настоящую погоду из интернета
        updateOnlineWeather();
        // Обновляем раз в 10 минут
        setInterval(updateOnlineWeather, 10 * 60 * 1000);


        // --- ОБНОВЛЕНИЕ ВРЕМЕНИ И ДАТЫ ---
        function updateClock() {
            var now = new Date();
            var hours = String(now.getHours());
            if (hours.length < 2) hours = '0' + hours;
            var minutes = String(now.getMinutes());
            if (minutes.length < 2) minutes = '0' + minutes;
            var seconds = String(now.getSeconds());
            if (seconds.length < 2) seconds = '0' + seconds;
            
            document.getElementById('time').textContent = hours + ':' + minutes + ':' + seconds;

            var options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', options);
        }
        setInterval(updateClock, 1000);
        updateClock();


        // --- КОНТРОЛЬ БАТАРЕИ ---
        var getBattery = navigator.getBattery || navigator.webkitGetBattery || navigator.mozGetBattery;
        if (getBattery) {
            navigator.getBattery().then(function(battery) {
                function updateBatteryStatus() {
                    var level = Math.round(battery.level * 100);
                    document.getElementById('battery-text').textContent = level + '%';
                    var levelDiv = document.getElementById('battery-level');
                    levelDiv.style.width = level + '%';

                    if (level <= 15) levelDiv.style.backgroundColor = '#ef4444';
                    else if (level <= 40) levelDiv.style.backgroundColor = '#f59e0b';
                    else levelDiv.style.backgroundColor = '#4caf50';

                    var batteryBox = document.getElementById('battery-box');
                    if (battery.charging) batteryBox.className = 'battery-container charging';
                    else batteryBox.className = 'battery-container';
                }
                updateBatteryStatus();
                battery.addEventListener('levelchange', updateBatteryStatus);
                battery.addEventListener('chargingchange', updateBatteryStatus);
            });
        } else {
            document.getElementById('battery-box').style.display = 'none';
        }
    </script>
</body>
</html>
