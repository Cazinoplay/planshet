<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смарт-Дисплей</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #0b0f19; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #time { font-size: 6rem; font-weight: bold; }
        #date { font-size: 2rem; color: #94a3b8; }
        .weather-box { margin-top: 30px; padding: 20px; border-radius: 20px; background: rgba(255, 255, 255, 0.05); }
        .weather-temp { font-size: 3rem; font-weight: bold; }
        .weather-desc { color: #3b82f6; font-size: 1.2rem; }
    </style>
</head>
<body onclick="document.documentElement.requestFullscreen()">

    <div id="time">00:00:00</div>
    <div id="date">--</div>
    
    <div class="weather-box">
        <div class="weather-temp" id="weather-temp">Загрузка...</div>
        <div class="weather-desc" id="weather-status">Подключение к сети...</div>
    </div>

    <script>
        // Обновление времени
        function updateClock() {
            const now = new Date();
            document.getElementById('time').textContent = now.toLocaleTimeString('ru-RU');
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Погода
        async function fetchWeather() {
            const url = "https://api.open-meteo.com/v1/forecast?latitude=54.9893&longitude=73.3682&current_weather=true";
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Сервер не ответил");
                
                const data = await response.json();
                const temp = Math.round(data.current_weather.temperature);
                
                document.getElementById('weather-temp').textContent = (temp > 0 ? "+" : "") + temp + "°C";
                document.getElementById('weather-status').textContent = "Омск: данные получены";
            } catch (err) {
                console.error(err);
                document.getElementById('weather-status').textContent = "Ошибка сети (проверьте блокировщик)";
                document.getElementById('weather-temp').textContent = "---";
            }
        }

        fetchWeather();
        // Обновлять погоду каждые 15 минут
        setInterval(fetchWeather, 15 * 60 * 1000);
    </script>
</body>
</html>
