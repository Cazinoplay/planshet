<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Смарт-Дисплей</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            user-select: none;
        }

        /* Верх: Батарея */
        .top-row { display: flex; justify-content: flex-start; }
        .battery-box { background: rgba(255, 255, 255, 0.05); padding: 12px 24px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); font-size: 1.3rem; }

        /* Центр: Время */
        .main-clock { text-align: center; margin: auto 0; }
        #time { font-size: 12rem; font-weight: 700; line-height: 1; }
        #date { font-size: 3rem; color: #94a3b8; }

        /* Низ: Погода */
        .weather-panel {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 150px;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="top-row">
        <div class="battery-box" id="battery-text">Заряд: --%</div>
    </div>

    <div class="main-clock">
        <div id="time">00:00:00</div>
        <div id="date">--</div>
    </div>

    <div class="weather-panel" id="weather">
        <a href="https://yandex.ru/pogoda/omsk" target="_blank">
            <img src="https://yandex.ru/pogoda/informer/map?lat=54.9924&lon=73.3686&size=large" alt="Погода в Омске" style="filter: invert(1) hue-rotate(180deg) brightness(1.2);">
        </a>
    </div>

    <script>
        // Часы
        function updateClock() {
            var n = new Date();
            document.getElementById('time').textContent = n.toLocaleTimeString('ru-RU');
            document.getElementById('date').textContent = n.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Батарея
        if (navigator.getBattery) {
            navigator.getBattery().then(function(b) {
                function update() { document.getElementById('battery-text').textContent = 'Заряд: ' + Math.round(b.level * 100) + '%'; }
                update();
                b.addEventListener('levelchange', update);
            });
        }
    </script>
</body>
</html>
