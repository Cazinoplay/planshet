<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Домашний Смарт-Дисплей</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b0f19;
            color: #ffffff;
            min-height: 100vh;
            padding: 4vw; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden;
            user-select: none;
            cursor: pointer;
        }

        /* Верхняя панель: Батарея */
        .top-row {
            display: flex;
            justify-content: flex-start;
            width: 100%;
            max-width: 800px;
        }

        .battery-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 600;
        }

        .battery-icon {
            width: clamp(40px, 5vw, 55px);
            height: clamp(20px, 2.5vw, 27px);
            border: 3px solid #fff;
            border-radius: 6px;
            position: relative;
            padding: 2px;
        }

        .battery-icon::after {
            content: '';
            position: absolute;
            right: -8px;
            top: 50%;
            transform: translateY(-50%);
            width: 5px;
            height: 9px;
            background: #fff;
            border-radius: 0 3px 3px 0;
        }

        .battery-level {
            height: 100%;
            background: #4caf50;
            width: 100%;
            border-radius: 2px;
            transition: width 0.5s ease, background-color 0.5s ease;
        }

        @keyframes charging {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
        .charging { animation: charging 1.5s infinite; }

        /* Центр: Время и Дата */
        .main-clock {
            text-align: center;
            width: 100%;
            margin: auto 0;
        }

        #time {
            font-size: clamp(4.5rem, 14vw, 12rem); 
            font-weight: 700;
            line-height: 0.9;
            letter-spacing: -2px;
            text-shadow: 0 0 40px rgba(255,255,255,0.15);
        }

        #date {
            font-size: clamp(1.4rem, 3.5vw, 2.8rem);
            color: #94a3b8;
            margin-top: 2vh;
            font-weight: 400;
            text-transform: capitalize;
        }

        /* Низ: Погода (Стильный текстовый вариант) */
        .weather-row {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .weather-box {
            width: 100%;
            max-width: 650px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 3vw 5vw;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .weather-city {
            font-size: clamp(1.1rem, 2.5vw, 1.6rem);
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .weather-desc {
            font-size: clamp(1rem, 2vw, 1.4rem);
            color: #3b82f6;
        }

        .weather-temp {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 700;
            color: #ffffff;
            white-space: nowrap;
        }

        /* Подсказка полноэкранного режима */
        .fullscreen-hint {
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 5px;
            pointer-events: none;
            transition: opacity 1s;
        }
    </style>
</head>
<body onclick="toggleFullscreen()">

    <div class="fullscreen-hint" id="hint">Тапни по экрану, чтобы убрать рамки браузера</div>

    <div class="top-row">
        <div class="battery-container" id="battery-box">
            <div class="battery-icon">
                <div class="battery-level" id="battery-level"></div>
            </div>
            <span id="battery-text">--%</span>
        </div>
    </div>

    <div class="main-clock">
        <div id="time">00:00:00</div>
        <div id="date">Понедельник, 1 января</div>
    </div>

    <div class="weather-row">
        <div class="weather-box">
            <div class="weather-info">
                <div class="weather-city">ОМСК</div>
                <div class="weather-desc" id="weather-status">Загрузка...</div>
            </div>
            <div class="weather-temp" id="weather-temp">--°C</div>
        </div>
    </div>

    <script>
        // --- ФУНКЦИЯ ДЛЯ ПОЛНОЭКРАННОГО РЕЖИМА ---
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().then(() => {
                    document.getElementById('hint').style.opacity = '0';
                }).catch(err => {
                    console.log(`Ошибка фуллскрина: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
                document.getElementById('hint').style.opacity = '1';
            }
        }

        // Координаты Омска
        const LATITUDE = 54.9924;  
        const LONGITUDE = 73.3686; 

        // ЗАПРОС ПОГОДЫ ЧЕРЕЗ БЕЗОПАСНЫЙ ПРОКСИ
        async function getWeather() {
            try {
                const targetUrl = `https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current_weather=true`;
                // Проксируем запрос, чтобы обойти блокировки браузера (CORS) для локального файла
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                const wrapper = await response.json();
                const data = JSON.parse(wrapper.contents); // Разжимаем полученные данные
                
                if (data && data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const code = data.current_weather.weathercode;
                    
                    document.getElementById('weather-temp').textContent = (temp > 0 ? '+' : '') + temp + '°C';
                    document.getElementById('weather-status').textContent = getWeatherDescription(code);
                }
            } catch (error) {
                console.error("Ошибка обновления погоды", error);
                document.getElementById('weather-status').textContent = "Обновление...";
                
                // Если прокси временно перегружен, пробуем сделать прямой запрос на всякий случай
                try {
                    const directResponse = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${LATITUDE}&longitude=${LONGITUDE}&current_weather=true`);
                    const directData = await directResponse.json();
                    if (directData && directData.current_weather) {
                        const temp = Math.round(directData.current_weather.temperature);
                        document.getElementById('weather-temp').textContent = (temp > 0 ? '+' : '') + temp + '°C';
                        document.getElementById('weather-status').textContent = getWeatherDescription(directData.current_weather.weathercode);
                    }
                } catch(e) {
                    document.getElementById('weather-status').textContent = "Ошибка сети";
                }
            }
        }

        function getWeatherDescription(code) {
            const codes = {
                0: "Ясно", 1: "Преимущественно ясно", 2: "Переменная облачность", 3: "Пасмурно",
                45: "Туман", 48: "Иней с туманом", 51: "Легкая морось", 53: "Морось", 55: "Плотная морось",
                61: "Слабый дождь", 63: "Умеренный дождь", 65: "Сильный дождь", 71: "Слабый снегопад",
                73: "Снегопад", 75: "Сильный снегопад", 77: "Снежные зерна", 80: "Слабый ливень",
                81: "Ливень", 82: "Сильный ливень", 85: "Слабый снежный ливень", 86: "Сильный снежный ливень",
                95: "Гроза", 96: "Гроза с градом"
            };
            return codes[code] || "Облачно";
        }

        // Обновляем погоду раз в 15 минут
        getWeather();
        setInterval(getWeather, 15 * 60 * 1000);


        // --- ОБНОВЛЕНИЕ ВРЕМЕНИ И ДАТЫ ---
        function updateClock() {
            const now = new Date();
            let hours = String(now.getHours()).padStart(2, '0');
            let minutes = String(now.getMinutes()).padStart(2, '0');
            let seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', options);
        }
        setInterval(updateClock, 1000);
        updateClock();


        // --- КОНТРОЛЬ БАТАРЕИ ---
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                function updateBatteryStatus() {
                    let level = Math.round(battery.level * 100);
                    document.getElementById('battery-text').textContent = level + '%';
                    const levelDiv = document.getElementById('battery-level');
                    levelDiv.style.width = level + '%';

                    if (level <= 15) levelDiv.style.backgroundColor = '#ef4444';
                    else if (level <= 40) levelDiv.style.backgroundColor = '#f59e0b';
                    else levelDiv.style.backgroundColor = '#4caf50';

                    const batteryBox = document.getElementById('battery-box');
                    if (battery.charging) batteryBox.classList.add('charging');
                    else batteryBox.classList.remove('charging');
                }
                updateBatteryStatus();
                battery.addEventListener('levelchange', updateBatteryStatus);
                battery.addEventListener('chargingchange', updateBatteryStatus);
            });
        } else {
            document.getElementById('battery-box').style.display = 'none';
        }
    </script>
</body>
</html>
